version: '3.8'

services:
  app:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/usp
      DATABASE_PROVIDER: postgresql
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      MQTT_TLS: "false"
      USP_CONTROLLER_ID: usp-controller-compose
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: insecure_secret
    ports:
      - "3000:3000"
    depends_on:
      - db
      - mosquitto

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: usp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_config:/mosquitto/config

volumes:
  db_data:
  mosquitto_data:
  mosquitto_config: